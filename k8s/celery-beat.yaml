apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: linkedin-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: linkedin-platform/backend:latest
          command: ["celery", "-A", "app.tasks.celery_app", "beat",
                    "--loglevel=info"]
          envFrom:
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
