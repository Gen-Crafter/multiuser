apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: linkedin-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: linkedin-platform/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend:8000"
            - name: NEXT_PUBLIC_WS_URL
              value: "ws://backend:8000/ws"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: linkedin-platform
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
